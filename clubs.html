<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Club Hub | View & Filter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body id="clubs">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">CH</div>
        <div>
          <p class="eyebrow">Club Hub</p>
          <h1>Club directory</h1>
        </div>
      </div>
      <div class="nav">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link active" href="/clubs.html">View & Filter</a>
        <a class="nav-link" href="/analysis.html">Analysis</a>
        <a class="nav-link" href="/activity.html">Activity</a>
      </div>
    </div>
    <div class="page">
      <div class="panel">
        <div class="section-header">
          <div>
            <p class="eyebrow">Search and filter</p>
            <h2>Filter clubs by interest, location, and popularity.</h2>
          </div>
          <p class="small-note">Hover cards to see contact details</p>
        </div>
        <div class="filters">
          <label>
            <div>Search by name</div>
            <input id="club-search" type="search" placeholder="Search clubs">
          </label>
          <label>
            <div>Category</div>
            <select id="club-category">
              <option value="all">All categories</option>
            </select>
          </label>
          <label>
            <div>Location</div>
            <select id="club-location">
              <option value="all">All locations</option>
            </select>
          </label>
          <label>
            <div>Popularity</div>
            <select id="club-popularity">
              <option value="all">All clubs</option>
              <option value="30">30+ members</option>
              <option value="50">50+ members</option>
              <option value="60">60+ members</option>
            </select>
          </label>
          <label>
            <div>Sort by</div>
            <select id="club-sort">
              <option value="popular">Most popular</option>
              <option value="name">Name</option>
              <option value="events">Upcoming events</option>
            </select>
          </label>
        </div>
      </div>
      <div class="panel">
        <div class="section-header">
          <h3>Club cards</h3>
          <div id="club-count" class="small-note"></div>
        </div>
        <div id="club-grid" class="card-grid"></div>
      </div>
    </div>
    <div id="foot">By: Haoxuan Zheng @ 2026</div>
  </body>
</html>
